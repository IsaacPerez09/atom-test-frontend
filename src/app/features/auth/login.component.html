<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="card max-w-md w-full p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Gestor de Tareas</h1>
      <p class="text-gray-500 mt-2">Inicia sesión para continuar</p>
    </div>

    @if (error()) {
    <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm" role="alert">
      {{ error() }}
    </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
          Dirección de correo electrónico
        </label>
        <input type="email" id="email" name="email" [ngModel]="email()" (ngModelChange)="email.set($event)"
          class="input-field" placeholder="pepeperez@ejemplo.com" autocomplete="email" required
          aria-describedby="email-hint" />
        <p id="email-hint" class="mt-1 text-sm text-gray-500">
          Ingresa tu correo para iniciar sesión o crear una cuenta
        </p>
      </div>

      <button type="submit" class="btn-primary w-full" [disabled]="!isValidEmail() || loading()">
        @if (loading()) {
        <span class="flex items-center justify-center gap-2">
          <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
          </svg>
          Procesando...
        </span>
        } @else {
        Continuar
        }
      </button>
    </form>

    @if (showCreateDialog()) {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="card max-w-sm mx-4 p-6">
        <h3 class="text-lg font-semibold mb-2">Crear Cuenta</h3>
        <p class="text-gray-600 mb-6">
          No se encontró ninguna cuenta para <strong>{{ email() }}</strong>. ¿Te gustaría crear una?
        </p>
        <div class="flex gap-3">
          <button (click)="onCancelCreate()"
            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
            Cancelar
          </button>
          <button (click)="onCreateUser()" class="flex-1 btn-primary" [disabled]="loading()">
            Crear Cuenta
          </button>
        </div>
      </div>
    </div>
    }
  </div>
</div>
